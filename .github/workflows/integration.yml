name: Integration Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  table-game:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run table game test
      run: |
        export PYTHONPATH="$(pwd):${PYTHONPATH}"
        python3 tests/table_game_test.py

    - name: Run web table game adapter test
      run: |
        export PYTHONPATH="$(pwd):${PYTHONPATH}"
        python3 tests/table_game_web_test.py

    - name: Run table game deduction soundness test
      run: |
        export PYTHONPATH="$(pwd):${PYTHONPATH}"
        python3 tests/table_game_inference_test.py

    - name: Run SDK resilience test
      run: |
        export PYTHONPATH="$(pwd):${PYTHONPATH}"
        python3 tests/sdk_resilience_test.py

  competition:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run competition integration test
      run: |
        export PYTHONPATH="$(pwd):${PYTHONPATH}"
        python3 tests/competition_test.py

  integration:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Build server
      run: |
        bazel build --cxxopt=-std=c++17 --features=external_include_paths --verbose_failures //server:server

    - name: Create CI config
      run: |
        printf "SERVER_PORT=40405\nSERVER_ADDR=localhost\nLOG_DIR=./log\n" > ci.config.env

    - name: Start server
      run: |
        mkdir -p log
        ./bazel-bin/server/server ci.config.env &
        echo "SERVER_PID=$!" >> "$GITHUB_ENV"
        echo "Waiting for server on port 40405..."
        for i in $(seq 1 20); do
          nc -z 127.0.0.1 40405 2>/dev/null && echo "Server ready (${i}s)" && break
          sleep 1
          if [ "$i" = "20" ]; then
            echo "ERROR: server did not start within 20 seconds"
            exit 1
          fi
        done

    - name: Run integration tests
      run: |
        export PYTHONPATH="$(pwd):${PYTHONPATH}"
        python3 tests/integration_test.py ci.config.env

    - name: Stop server
      if: always()
      run: |
        if [ -n "$SERVER_PID" ]; then
          kill "$SERVER_PID" || true
        fi
