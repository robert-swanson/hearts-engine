<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Safari (desktop and iOS) does not render SVG favicons, so the SVG-only
         setup left the tab/home-screen icon as the Vite default. Ship raster
         fallbacks: .ico for legacy/desktop tabs, PNGs for modern browsers, and
         apple-touch-icon.png which iOS Safari requires for bookmarks/home
         screen. SVG stays first for browsers that do support it. (issue #58) -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#000000" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hearts</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
